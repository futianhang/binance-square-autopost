name: test-square-connectivity

on:
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 打印社交热度榜真实返回内容
        run: |
          curl -s "https://web3.binance.com/bapi/defi/v1/public/wallet-direct/buw/wallet/market/token/pulse/social/hype/rank/leaderboard/ai?chainId=56&sentiment=All&socialLanguage=ALL"

      - name: 打印趋势榜真实返回内容(只看前2000字符,完整结构够用了)
        run: |
          curl -s -X POST -H "Content-Type: application/json" \
            -d '{"chainId":"56","rankType":10,"limit":20}' \
            "https://web3.binance.com/bapi/defi/v1/public/wallet-direct/buw/wallet/market/token/pulse/rank/list/ai" \
            | head -c 2000
