name: square-auto-post

on:
  schedule:
    # 每15分钟一次, 24h约96次, 留出余量在100次/天的限额内
    # 注意: GitHub的schedule在高峰期可能延迟几分钟到十几分钟,不保证精确触发
    - cron: '*/15 * * * *'
  workflow_dispatch: {}   # 允许手动在Actions页面点一下立即跑一次,方便测试

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装Python依赖
        run: pip install -r requirements.txt

      - name: 发帖(真实环境,非dry-run)
        env:
          BINANCE_SQUARE_OPENAPI_KEY: ${{ secrets.BINANCE_SQUARE_OPENAPI_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_USER_ID: ${{ secrets.TELEGRAM_USER_ID }}
        run: python3 scripts/run_once.py --rank 0
