name: square-auto-post

on:
  schedule:
    # 每15分钟一次, 24h约96次, 留出余量在100次/天的限额内
    - cron: '7,22,37,52 * * * *'  
  workflow_dispatch:
    inputs:
      dry_run:
        description: '测试模式(不会真实发帖,只生成文案和图片)'
        type: boolean
        default: true

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装Python依赖
        run: pip install -r requirements.txt

      - name: 运行(定时任务时永远是真实发帖,手动触发时按勾选项决定)
        env:
          BINANCE_SQUARE_OPENAPI_KEY: ${{ secrets.BINANCE_SQUARE_OPENAPI_KEY }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            python3 scripts/run_once.py --dry-run
          else
            python3 scripts/run_once.py --rank 0
          fi

      - name: 上传本次生成的文案和图片(方便下载查看,7天后自动删除)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-preview-${{ github.run_id }}
          path: data/tmp/
          retention-days: 7
